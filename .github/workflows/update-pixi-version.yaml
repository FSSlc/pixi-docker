name: Update Pixi version

on:
  schedule:
    - cron: "19 */6 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  update-pixi-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest Pixi release
        id: latest-release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: "prefix-dev",
              repo: "pixi",
            });
            core.setOutput("tag_name", release.data.tag_name);

      - name: Compare with tracked version
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          current_version="$(tr -d '\n' < .pixi-version)"
          latest_version="${{ steps.latest-release.outputs.tag_name }}"
          echo "current_version=${current_version}" >> "${GITHUB_OUTPUT}"
          echo "latest_version=${latest_version}" >> "${GITHUB_OUTPUT}"
          if [[ "${current_version}" != "${latest_version}" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update tracked version
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' '${{ steps.compare.outputs.latest_version }}' > .pixi-version
          sed -i 's/^ARG PIXI_VERSION=.*/ARG PIXI_VERSION=${{ steps.compare.outputs.latest_version }}/' Dockerfile

      - name: Commit version bump
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pixi-version Dockerfile
          git commit -m "chore: bump Pixi to ${{ steps.compare.outputs.latest_version }}"
          git push

      - name: Trigger image build
        if: steps.compare.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build.yaml",
              ref: context.payload.repository.default_branch,
              inputs: {
                pixi_version: "${{ steps.compare.outputs.latest_version }}"
              }
            });
